name: hawc_env
channels:
  - conda-forge
dependencies:
  - python=3.11
  - sasktran2        # installed from conda-forge — do NOT pip install, requires compilation
  - xarray
  - scipy
  - numpy
  - matplotlib
  - pandas
  - cartopy
  - numba
  - pip
  - pip:
    - hawcsimulator  # pure Python, safe to install from PyPI
